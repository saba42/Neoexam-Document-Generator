:root {
    /*examly orange*/
    --one: #f58020;
    /*examly blue*/
    --two: #363b59;
    /*sidebar color*/
    --three: #2d314c;
    /*tabset*/
    --four: #545c89;
    /*examly blue with opacity*/
    --five: #363b5926;
    /*examly orange split*/
    --six: #dd731d;
    /*examly orange split focus*/
    --seven: #e3761d;
    /*examly sidebar icon colors*/
    --eight: #9194a8;
    /*course side div*/
    --nine: #383d5f;
    /*delete button red */
    --ten: #ed5e68;
    /*add to cart*/
    --eleven: #e1f5fe;
    /* dark grey */
    --twelve: #484848;
    /* for url link blue colour */
    --thirteen: #6495ed;
    /* White colour */
    --fourteen: #dfdfdf;
    /* White colour */
    --fifteen: #ffffff;
    /* Gray colour */
    --sixteen: #ababab;
    /* Very light gray. colour */
    --seventeen: #eeeeee;
    /* Dark cyan colour */
    --eighteen: #20a090;
    /*  Very light gray (mostly white)*/
    --nineteen: #f5f5f5;
    /* Black colour */
    --twenty: #000000;
    /*light grey*/
    --twentyone: #dfdfdf80;
    /*light blue*/
    --twentytwo: #ecf0f1;
    /*examly blue variation 1*/
    --twentythree: #303674;
    /* examly blue violet */
    --twentyfour: #717ba5;
    /* secondary blue */
    --secondary-cam-color: #022277;
    /* score band colors */
    --good: #8ac926;
    --satisfactory: #f4ac45;
    --attention: #ef946c;
    --intervention: #f05d5e;
    /*------------------------------------*\
    navbar settings
    \*------------------------------------*/
    --bar-width: 25px;
    --bar-height: 2px;
    --bar-margin: 2px;
    --bar-borderradius: 10px;
    /* arrow angle from 0 - 90 */
    --bar-arrow-angle-value: 45;
    --bar-transition: cubic-bezier(0.25, 0.01, 0.75, 1);
    --bar-transition-time: 0.3s;
    /*------------------------------------*\
        navbar calculations
        \*------------------------------------*/
    /* flexbox prevents margin collapse, so add that margin twice*/
    --bar-offset: calc(var(--bar-height) + var(--bar-margin) * 2);
    /* arrow angle */
    --bar-arrow-angle: calc(var(--bar-arrow-angle-value) * 1deg);
    /* offset of arrows so that they align perfectly */
    --bar-arrow-offset: calc(var(--bar-height) * 1.2 + var(--bar-margin) * 2);
    /* center arrow to label without middle line */
    --bar-arrow-offsetcenter: calc(50% * var(--bar-arrow-angle-value) / 90);
    --plyr-color-main: #f58020;
}
